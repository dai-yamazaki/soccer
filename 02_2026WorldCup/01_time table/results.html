<head>

  <style>
    :root {
      --primary: #1a3a6c;
      --japan:   #bc002d;
      --gold:    #f0b429;
      --bg:      #f0f2f8;
      --card:    #fff;
      --border:  #d0d7e8;
      --text:    #1a1a2e;
      --muted:   #64748b;
      --win:     #16a34a;
      --draw:    #ca8a04;
      --loss:    #dc2626;
      --qualify: #dcfce7;
      --potential:#fef9c3;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: var(--bg); color: var(--text); font-size: 13px;
    }

    /* ===== HEADER ===== */
    header {
      background: linear-gradient(135deg, var(--primary) 0%, #0d2547 100%);
      color: white; padding: 22px 20px 16px; text-align: center;
      position: relative; overflow: hidden;
    }
    header::before {
      content: ''; position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='28' fill='none' stroke='%23ffffff' stroke-width='1.5' stroke-opacity='0.07'/%3E%3C/svg%3E") repeat;
    }
    header h1 { font-size: 22px; font-weight: 800; position: relative; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
    header .subtitle { font-size: 12px; opacity: 0.85; margin-top: 4px; position: relative; }

    /* ===== STICKY HEADER ===== */
    .sticky-top {
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }

    /* ===== TAB NAV ===== */
    .tab-nav {
      background: #0d2547;
      display: flex; justify-content: center; gap: 4px;
    }
    .tab-nav a {
      display: inline-block;
      padding: 10px 24px;
      color: rgba(255,255,255,0.65); text-decoration: none;
      font-size: 13px; font-weight: 600;
      border-bottom: 3px solid transparent;
      white-space: nowrap; transition: all 0.15s;
    }
    .tab-nav a:hover { color: white; }
    .tab-nav a.active { color: white; border-bottom-color: var(--gold); }
    @media (max-width: 600px) {
      .tab-nav { gap: 0; }
      .tab-nav a { flex: 1; text-align: center; padding: 9px 4px; font-size: 11px; }
    }

    /* ===== JAPAN BANNER ===== */
    .japan-banner {
      background: linear-gradient(135deg, #bc002d 0%, #8b0021 100%);
      color: white; text-align: center;
      padding: 10px 14px; font-size: 12px; font-weight: 600; line-height: 1.7;
    }
    .japan-banner strong { color: var(--gold); }

    /* ===== MAIN ===== */
    main { max-width: 1100px; margin: 0 auto; padding: 16px 14px 48px; }

    /* ===== SECTION TITLE ===== */
    .section-title {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.1em;
      margin: 20px 0 12px; padding-bottom: 6px;
      border-bottom: 2px solid var(--border);
    }

    /* ===== GROUP GRID ===== */
    .groups-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 14px;
    }

    /* ===== GROUP CARD ===== */
    .group-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .group-card.japan-group { border-color: var(--japan); box-shadow: 0 0 0 2px rgba(188,0,45,0.15); }

    .group-header {
      background: var(--primary); color: white;
      padding: 9px 14px;
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; user-select: none;
    }
    .group-card.japan-group .group-header { background: linear-gradient(90deg, var(--japan), #8b0021); }
    .group-label {
      font-size: 16px; font-weight: 800;
      background: rgba(255,255,255,0.18);
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px; flex-shrink: 0;
    }
    .group-teams-label { font-size: 11px; opacity: 0.9; flex: 1; }
    .group-toggle { font-size: 12px; opacity: 0.7; flex-shrink: 0; transition: transform 0.2s; }
    .group-card.collapsed .group-toggle { transform: rotate(-90deg); }

    .group-body { padding: 0; }
    .group-card.collapsed .group-body { display: none; }

    /* ===== STANDINGS TABLE ===== */
    .standings-table {
      width: 100%; border-collapse: collapse; font-size: 12px;
    }
    .standings-table th {
      background: #f0f4fb; color: var(--muted);
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
      padding: 5px 6px; text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .standings-table th.team-col { text-align: left; padding-left: 10px; }
    .standings-table td {
      padding: 7px 6px; text-align: center;
      border-bottom: 1px solid #f0f3fa;
      font-size: 12px; vertical-align: middle;
    }
    .standings-table td.team-cell {
      text-align: left; padding-left: 10px;
      font-weight: 600; display: flex; align-items: center; gap: 5px;
    }
    .standings-table tr:last-child td { border-bottom: none; }
    .standings-table tr.qualify  td { background: var(--qualify); }
    .standings-table tr.potential td { background: var(--potential); }
    .standings-table tr.japan-team td { background: #fff0f0; }

    .rank-num { color: var(--muted); font-size: 10px; width: 14px; text-align: right; flex-shrink: 0; }
    .pts-cell { font-weight: 800; color: var(--primary); }
    .gd-cell.pos { color: var(--win); }
    .gd-cell.neg { color: var(--loss); }

    /* ===== MATCH RESULT ROWS ===== */
    .matches-section {
      border-top: 2px solid #f0f3fa;
      padding: 8px 0 4px;
    }
    .md-label {
      font-size: 9px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em;
      padding: 4px 10px 2px;
    }
    .match-row {
      display: flex; align-items: center;
      padding: 6px 10px; gap: 6px;
      border-bottom: 1px solid #f5f7fc; font-size: 12px;
    }
    .match-row:last-child { border-bottom: none; }
    .match-row.japan-match { background: #fff5f5; }

    .match-date { font-size: 10px; color: var(--muted); width: 70px; flex-shrink: 0; }
    .match-home { flex: 1; text-align: right; font-weight: 600; }
    .match-score {
      font-size: 13px; font-weight: 800; color: var(--primary);
      background: #f0f4fb; border-radius: 6px;
      padding: 3px 8px; min-width: 52px; text-align: center; flex-shrink: 0;
    }
    .match-score.played { background: #1a3a6c; color: white; }
    .match-score.live   { background: #dc2626; color: white; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
    .match-away { flex: 1; font-weight: 600; }
    .result-badge {
      font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; flex-shrink: 0;
    }
    .result-badge.w { background: #dcfce7; color: #166534; }
    .result-badge.d { background: #fef9c3; color: #854d0e; }
    .result-badge.l { background: #fee2e2; color: #991b1b; }

    /* Legend */
    .legend-row {
      display: flex; flex-wrap: wrap; gap: 8px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px; margin-bottom: 14px;
      font-size: 11px; align-items: center;
    }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    footer {
      text-align: center; padding: 14px; font-size: 11px; color: var(--muted);
      border-top: 1px solid var(--border); margin-top: 12px;
    }

    /* ===== MOBILE ===== */
    @media (max-width: 600px) {
      .groups-grid { grid-template-columns: 1fr; }
      .match-date { width: 58px; font-size: 9px; }
      .match-score { min-width: 44px; font-size: 12px; padding: 3px 5px; }
      .standings-table td, .standings-table th { padding: 5px 4px; font-size: 11px; }
      .standings-table td.team-cell { padding-left: 8px; font-size: 11px; }
      main { padding: 12px 8px 40px; }
    }
  </style>
</head>

/* ============================================================
   STANDINGS CALCULATION
============================================================ */
function calcStandings(grp) {
  const stat = {};
  GROUPS[grp].forEach(t => { stat[t] = { gp:0, w:0, d:0, l:0, gf:0, ga:0, pts:0 }; });

  MATCHES.filter(m => m.grp === grp && m.hs !== null && m.as !== null).forEach(m => {
    const h = stat[m.home], a = stat[m.away];
    h.gp++; a.gp++;
    h.gf += m.hs; h.ga += m.as;
    a.gf += m.as; a.ga += m.hs;
    if (m.hs > m.as)      { h.w++; h.pts += 3; a.l++; }
    else if (m.hs < m.as) { a.w++; a.pts += 3; h.l++; }
    else                  { h.d++; h.pts++;     a.d++; a.pts++; }
  });

  return GROUPS[grp]
    .map(code => ({ code, ...stat[code], gd: stat[code].gf - stat[code].ga }))
    .sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.code.localeCompare(b.code));
}

/* ============================================================
   FORMAT DATE
============================================================ */
const DOW = ['日','月','火','水','木','金','土'];
function fmtDate(mmdd, time) {
  const [m, d] = mmdd.split('-').map(Number);
  const date = new Date(2026, m - 1, d);
  return `${m}/${d}(${DOW[date.getDay()]}) ${time}`;
}

/* ============================================================
   BUILD GROUP CARDS
============================================================ */
const grid = document.getElementById('groups-grid');

Object.keys(GROUPS).forEach(grp => {
  const isJapan = grp === 'F';
  const standings = calcStandings(grp);
  const groupMatches = MATCHES.filter(m => m.grp === grp);
  const played = groupMatches.filter(m => m.hs !== null).length;

  /* Card */
  const card = document.createElement('div');
  card.className = 'group-card' + (isJapan ? ' japan-group' : '');

  /* Header */
  const teamNames = GROUPS[grp].map(t => TEAMS[t].name).join('／');
  card.innerHTML = `
    <div class="group-header" onclick="this.parentElement.classList.toggle('collapsed')">
      <div class="group-label">${grp}</div>
      <div class="group-teams-label">${teamNames}</div>
      <div class="group-toggle">▼</div>
    </div>
    <div class="group-body">
      ${buildStandingsTable(standings, played)}
      ${buildMatchRows(groupMatches, grp)}
    </div>`;

  grid.appendChild(card);
});

function buildStandingsTable(standings, played) {
  let rows = '';
  standings.forEach((s, i) => {
    const t = TEAMS[s.code];
    const isJPN = s.code === 'JPN';
    const qualClass = played >= 2 && i < 2 ? 'qualify' : played >= 1 && i < 3 ? 'potential' : '';
    const jpnClass  = isJPN ? 'japan-team' : '';
    const gdStr = s.gd > 0 ? `+${s.gd}` : `${s.gd}`;
    const gdClass = s.gd > 0 ? 'pos' : s.gd < 0 ? 'neg' : '';
    rows += `
      <tr class="${qualClass} ${jpnClass}">
        <td><div class="team-cell"><span class="rank-num">${i+1}</span>${t.flag} ${t.name}</div></td>
        <td>${s.gp}</td><td>${s.w}</td><td>${s.d}</td><td>${s.l}</td>
        <td>${s.gf}</td><td>${s.ga}</td>
        <td class="gd-cell ${gdClass}">${s.gp > 0 ? gdStr : '—'}</td>
        <td class="pts-cell">${s.pts}</td>
      </tr>`;
  });
  return `
    <table class="standings-table">
      <thead>
        <tr>
          <th class="team-col">チーム</th>
          <th title="試合数">試</th><th title="勝">勝</th><th title="分">分</th><th title="負">負</th>
          <th title="得点">得</th><th title="失点">失</th><th title="得失点差">差</th>
          <th title="勝点">勝点</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function buildMatchRows(matches, grp) {
  let html = '<div class="matches-section">';
  let curMd = 0;

  matches.forEach(m => {
    if (m.md !== curMd) {
      curMd = m.md;
      html += `<div class="md-label">第${m.md}節</div>`;
    }

    const h = TEAMS[m.home], a = TEAMS[m.away];
    const played = m.hs !== null && m.as !== null;
    const isJapanMatch = m.home === 'JPN' || m.away === 'JPN';
    const scoreText = played ? `${m.hs} - ${m.as}` : '--:--';
    const scoreClass = played ? 'played' : '';

    let badge = '';
    if (isJapanMatch && played) {
      const jpnIsHome = m.home === 'JPN';
      const jpnScore  = jpnIsHome ? m.hs : m.as;
      const oppScore  = jpnIsHome ? m.as : m.hs;
      if (jpnScore > oppScore)       badge = '<span class="result-badge w">W</span>';
      else if (jpnScore < oppScore)  badge = '<span class="result-badge l">L</span>';
      else                           badge = '<span class="result-badge d">D</span>';
    }

    html += `
      <div class="match-row ${isJapanMatch ? 'japan-match' : ''}">
        <div class="match-date">${fmtDate(m.date, m.time)}</div>
        <div class="match-home">${h.flag} ${h.name}</div>
        <div class="match-score ${scoreClass}">${scoreText}</div>
        <div class="match-away">${a.name} ${a.flag}</div>
        ${badge}
      </div>`;
  });

  html += '</div>';
  return html;
}
