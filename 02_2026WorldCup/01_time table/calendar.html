<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 FIFAワールドカップ カレンダー（日本時間）</title>
  <style>
    :root {
      --primary: #1a3a6c;
      --japan:   #bc002d;
      --gold:    #f0b429;
      --bg:      #f0f2f8;
      --card:    #fff;
      --border:  #d0d7e8;
      --text:    #1a1a2e;
      --muted:   #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: var(--bg); color: var(--text); font-size: 13px;
    }

    /* ===== HEADER ===== */
    header {
      background: linear-gradient(135deg, var(--primary) 0%, #0d2547 100%);
      color: white; padding: 22px 20px 16px; text-align: center;
      position: relative; overflow: hidden;
    }
    header::before {
      content: ''; position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='28' fill='none' stroke='%23ffffff' stroke-width='1.5' stroke-opacity='0.07'/%3E%3C/svg%3E") repeat;
    }
    header h1 { font-size: 22px; font-weight: 800; position: relative; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
    header .subtitle { font-size: 12px; opacity: 0.85; margin-top: 4px; position: relative; }

    /* ===== STICKY HEADER ===== */
    .sticky-top {
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }

    /* ===== TAB NAV ===== */
    .tab-nav {
      background: #0d2547;
      display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .tab-nav::-webkit-scrollbar { display: none; }
    .tab-nav a {
      display: inline-block; flex-shrink: 0;
      padding: 10px 20px; color: rgba(255,255,255,0.65);
      text-decoration: none; font-size: 12px; font-weight: 600;
      border-bottom: 3px solid transparent; white-space: nowrap; transition: all 0.15s;
    }
    .tab-nav a:hover { color: white; }
    .tab-nav a.active { color: white; border-bottom-color: var(--gold); }

    /* ===== JAPAN BANNER ===== */
    .japan-banner {
      background: linear-gradient(135deg, #bc002d 0%, #8b0021 100%);
      color: white; padding: 10px 14px; font-size: 11px; font-weight: 600; line-height: 1.7; text-align: center;
    }
    .japan-banner strong { color: var(--gold); }

    /* ===== LEGEND ===== */
    .legend {
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
      padding: 10px 14px; background: var(--card);
      border-bottom: 1px solid var(--border); font-size: 11px;
    }
    .legend-badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 700;
    }

    /* ===== MAIN ===== */
    main { max-width: 860px; margin: 0 auto; padding: 14px 12px 48px; }

    /* ===== MATCHDAY SECTION ===== */
    .md-section { margin-bottom: 20px; }
    .md-heading {
      font-size: 11px; font-weight: 800; color: var(--primary);
      text-transform: uppercase; letter-spacing: 0.12em;
      padding: 6px 0 6px 2px; margin-bottom: 6px;
      border-bottom: 2px solid var(--primary);
      display: flex; align-items: center; gap: 8px;
    }
    .md-heading span {
      background: var(--primary); color: white;
      padding: 2px 10px; border-radius: 10px; font-size: 10px;
    }

    /* ===== DAY BLOCK ===== */
    .day-block {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .day-header {
      background: #f0f4fb;
      padding: 7px 14px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border);
    }
    .day-header .day-date {
      font-size: 14px; font-weight: 800; color: var(--primary);
    }
    .day-header .day-count {
      font-size: 10px; color: var(--muted); margin-left: auto;
    }
    .day-header.sat .day-date { color: #1d4ed8; }
    .day-header.sun .day-date { color: #dc2626; }

    /* ===== MATCH ROW ===== */
    .match-row {
      display: flex; align-items: center;
      padding: 8px 12px; gap: 8px;
      border-bottom: 1px solid #f3f5fb;
      transition: background 0.1s;
    }
    .match-row:last-child { border-bottom: none; }
    .match-row:hover { background: #f7f9ff; }

    /* Japan row */
    .match-row.japan {
      background: #fffbeb;
    }
    .match-row.japan:hover { background: #fef3c7; }

    /* Featured (注目国) row */
    .match-row.featured {
      background: #f0f9ff;
    }
    .match-row.featured:hover { background: #e0f2fe; }

    /* Star for featured */
    .star-feat { font-size: 11px; flex-shrink: 0; line-height: 1; }

    /* Group badge */
    .grp-badge {
      width: 20px; height: 20px; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 800; color: white; flex-shrink: 0;
    }

    /* Star */
    .star { font-size: 13px; flex-shrink: 0; line-height: 1; }

    /* Time */
    .match-time {
      font-size: 13px; font-weight: 800; color: var(--primary);
      width: 40px; text-align: right; flex-shrink: 0;
    }
    .match-row.japan .match-time { color: #92400e; }

    /* Teams */
    .match-teams {
      flex: 1; display: flex; align-items: center; gap: 4px;
      font-size: 12px; font-weight: 600; min-width: 0;
    }
    .team-flag { font-size: 16px; line-height: 1; flex-shrink: 0; }
    .team-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .vs-sep { color: var(--muted); font-size: 10px; flex-shrink: 0; padding: 0 2px; }
    .match-row.japan .team-name { font-weight: 700; }
    .team-name.jpn-name { color: var(--japan); font-weight: 800; }

    /* Score (for played matches) */
    .match-score {
      font-size: 13px; font-weight: 800;
      background: var(--primary); color: white;
      border-radius: 5px; padding: 2px 8px;
      flex-shrink: 0; min-width: 42px; text-align: center;
    }

    /* Channel badges */
    .ch-list { display: flex; gap: 3px; flex-shrink: 0; flex-wrap: nowrap; }
    .ch {
      font-size: 9px; font-weight: 800;
      padding: 2px 5px; border-radius: 3px; white-space: nowrap;
    }
    .ch-nhk   { background: #1e4d2b; color: #fff; }
    .ch-nhkbs { background: #155e75; color: #fff; }
    .ch-ntv   { background: #b91c1c; color: #fff; }
    .ch-fuji  { background: #1d4ed8; color: #fff; }
    .ch-free  { background: #92400e; color: #fef3c7; }
    .ch-dazn  { background: #374151; color: #fff; }

    footer {
      text-align: center; padding: 14px; font-size: 11px; color: var(--muted);
      border-top: 1px solid var(--border); margin-top: 8px;
    }

    /* ===== MOBILE ===== */
    @media (max-width: 480px) {
      .tab-nav a { padding: 9px 14px; font-size: 11px; }
      main { padding: 10px 8px 40px; }
      .match-teams { font-size: 11px; }
      .team-flag { font-size: 14px; }
      .match-time { font-size: 12px; width: 36px; }
      .ch { font-size: 8px; padding: 2px 4px; }
      .team-name { max-width: 72px; }
    }
  </style>
</head>
<body>

<header>
  <h1>⚽ 2026 FIFA World Cup</h1>
  <div class="subtitle">試合日程 &amp; 放送局（日本時間 / JST）</div>
</header>

<div class="sticky-top">
<nav class="tab-nav">
  <a href="schedule.html">📋 日程表</a>
  <a href="calendar.html" class="active">📅 カレンダー</a>
  <a href="results.html">📊 結果・順位</a>
  <a href="bracket.html">🏆 トーナメント表</a>
</nav>
</div><!-- /.sticky-top -->

<div class="japan-banner">
  🇯🇵 日本代表 ／ <strong>6/15(月) 5:00</strong> オランダ戦　<strong>6/21(日) 13:00</strong> チュニジア戦　<strong>6/26(金) 8:00</strong> スウェーデン戦
</div>

<div class="legend">
  <span style="font-size:10px;font-weight:700;color:var(--muted);">放送局：</span>
  <span class="legend-badge ch-nhk">NHK</span>
  <span class="legend-badge ch-nhkbs">NHK BS</span>
  <span class="legend-badge ch-ntv">日テレ</span>
  <span class="legend-badge ch-fuji">フジ</span>
  <span class="legend-badge ch-dazn">DAZN独占</span>
  <span class="legend-badge ch-free">無料配信</span>
  <span style="margin-left:4px;font-size:10px;">⭐ 日本戦</span>
  <span style="margin-left:4px;font-size:10px;">🔵 注目国（🏴󠁧󠁢󠁥󠁮󠁧󠁿🇪🇸🇫🇷🇧🇷🇦🇷🇵🇹）</span>
</div>

<main id="main"></main>

<footer>
  2026 FIFA World Cup グループステージ全72試合（日本時間 JST）｜放送局情報はゲキサカ等より
</footer>

<script>
/* ============================================================
   TEAM DATA
============================================================ */
const T = {
  MX: ['🇲🇽','メキシコ'],   RSA:['🇿🇦','南アフリカ'], KOR:['🇰🇷','韓国'],
  CZE:['🇨🇿','チェコ'],      CAN:['🇨🇦','カナダ'],     BIH:['🇧🇦','ボスニア'],
  QAT:['🇶🇦','カタール'],    SUI:['🇨🇭','スイス'],      BRA:['🇧🇷','ブラジル'],
  MAR:['🇲🇦','モロッコ'],    HAI:['🇭🇹','ハイチ'],      SCO:['🏴󠁧󠁢󠁳󠁣󠁴󠁿','スコットランド'],
  USA:['🇺🇸','アメリカ'],    PAR:['🇵🇾','パラグアイ'],   AUS:['🇦🇺','オーストラリア'],
  TUR:['🇹🇷','トルコ'],      GER:['🇩🇪','ドイツ'],      CUW:['🇨🇼','キュラソー'],
  CIV:['🇨🇮','コートジボワール'], ECU:['🇪🇨','エクアドル'],
  NED:['🇳🇱','オランダ'],    JPN:['🇯🇵','日本'],         SWE:['🇸🇪','スウェーデン'],
  TUN:['🇹🇳','チュニジア'],  BEL:['🇧🇪','ベルギー'],    EGY:['🇪🇬','エジプト'],
  IRN:['🇮🇷','イラン'],      NZL:['🇳🇿','ニュージーランド'],
  ESP:['🇪🇸','スペイン'],    CPV:['🇨🇻','カーボベルデ'],  KSA:['🇸🇦','サウジアラビア'],
  URU:['🇺🇾','ウルグアイ'],  FRA:['🇫🇷','フランス'],     SEN:['🇸🇳','セネガル'],
  IRQ:['🇮🇶','イラク'],      NOR:['🇳🇴','ノルウェー'],   ARG:['🇦🇷','アルゼンチン'],
  ALG:['🇩🇿','アルジェリア'], AUT:['🇦🇹','オーストリア'],  JOR:['🇯🇴','ヨルダン'],
  POR:['🇵🇹','ポルトガル'],  COD:['🇨🇩','コンゴ民主'],   UZB:['🇺🇿','ウズベキスタン'],
  COL:['🇨🇴','コロンビア'],  ENG:['🏴󠁧󠁢󠁥󠁮󠁧󠁿','イングランド'],
  CRO:['🇭🇷','クロアチア'],  GHA:['🇬🇭','ガーナ'],       PAN:['🇵🇦','パナマ'],
};

/* ============================================================
   GROUP COLORS
============================================================ */
const GC = {
  A:'#f97316',B:'#3b82f6',C:'#16a34a',D:'#9333ea',
  E:'#dc2626',F:'#bc002d',G:'#0891b2',H:'#d97706',
  I:'#4f46e5',J:'#0284c7',K:'#65a30d',L:'#db2777'
};

/* ============================================================
   CHANNEL HELPERS
  tv: array of channel codes
  'N'=NHK総合, 'B'=NHK BS, 'T'=日テレ, 'F'=フジ, 'D'=DAZN独占
  Japan matches automatically get 'FREE' badge appended
============================================================ */
const N='N', B='B', Nt='T', F='F'; // shorthands

/* ============================================================
   MATCH DATA
   [group, md, date(MM-DD), time, home, away, [tv channels]]
   tv: 'N'=NHK, 'B'=NHK BS, 'T'=日テレ, 'F'=フジ  (DAZN は全試合)
============================================================ */
const MATCHES = [
  /* ── MD1 ── */
  ['A',1,'06-12','4:00', 'MX', 'RSA',[N]],
  ['A',1,'06-12','11:00','KOR','CZE',[]],
  ['B',1,'06-13','4:00', 'CAN','BIH',[N]],
  ['D',1,'06-13','10:00','USA','PAR',[]],
  ['B',1,'06-14','4:00', 'QAT','SUI',[]],
  ['C',1,'06-14','7:00', 'BRA','MAR',[]],
  ['C',1,'06-14','10:00','HAI','SCO',[N]],
  ['D',1,'06-14','13:00','AUS','TUR',[Nt]],
  ['E',1,'06-15','2:00', 'GER','CUW',[]],
  ['F',1,'06-15','5:00', 'NED','JPN',[N]],      // ★Japan
  ['E',1,'06-15','8:00', 'CIV','ECU',[]],
  ['F',1,'06-15','11:00','SWE','TUN',[Nt]],
  ['H',1,'06-16','2:00', 'ESP','CPV',[N]],
  ['G',1,'06-16','7:00', 'BEL','EGY',[N]],
  ['H',1,'06-16','7:00', 'KSA','URU',[]],
  ['G',1,'06-16','13:00','IRN','NZL',[]],
  ['I',1,'06-17','4:00', 'FRA','SEN',[F]],
  ['I',1,'06-17','7:00', 'IRQ','NOR',[]],
  ['J',1,'06-17','10:00','ARG','ALG',[N]],
  ['J',1,'06-17','13:00','AUT','JOR',[]],
  ['K',1,'06-18','2:00', 'POR','COD',[F]],
  ['L',1,'06-18','5:00', 'ENG','CRO',[]],
  ['L',1,'06-18','8:00', 'GHA','PAN',[]],
  ['K',1,'06-18','11:00','UZB','COL',[]],
  /* ── MD2 ── */
  ['A',2,'06-19','1:00', 'CZE','RSA',[Nt]],
  ['B',2,'06-19','4:00', 'SUI','BIH',[]],
  ['B',2,'06-19','7:00', 'CAN','QAT',[]],
  ['A',2,'06-19','12:00','MX', 'KOR',[N]],
  ['D',2,'06-20','4:00', 'USA','AUS',[N]],
  ['C',2,'06-20','7:00', 'SCO','MAR',[F]],
  ['C',2,'06-20','10:00','BRA','HAI',[N]],
  ['D',2,'06-20','13:00','TUR','PAR',[]],
  ['F',2,'06-21','2:00', 'NED','SWE',[N]],
  ['E',2,'06-21','5:00', 'GER','CIV',[Nt]],
  ['E',2,'06-21','9:00', 'ECU','CUW',[]],
  ['F',2,'06-21','13:00','TUN','JPN',[Nt,B]],   // ★Japan
  ['H',2,'06-22','1:00', 'ESP','KSA',[N]],
  ['G',2,'06-22','4:00', 'BEL','IRN',[]],
  ['H',2,'06-22','7:00', 'URU','CPV',[]],
  ['G',2,'06-22','10:00','NZL','EGY',[]],
  ['J',2,'06-23','2:00', 'ARG','AUT',[]],
  ['I',2,'06-23','6:00', 'FRA','IRQ',[]],
  ['I',2,'06-23','9:00', 'NOR','SEN',[N]],
  ['J',2,'06-23','12:00','JOR','ALG',[]],
  ['K',2,'06-24','2:00', 'POR','UZB',[N]],
  ['L',2,'06-24','5:00', 'ENG','GHA',[]],
  ['L',2,'06-24','8:00', 'PAN','CRO',[F]],
  ['K',2,'06-24','11:00','COL','COD',[Nt]],
  /* ── MD3 ── */
  ['B',3,'06-25','4:00', 'SUI','CAN',[N]],
  ['B',3,'06-25','4:00', 'BIH','QAT',[]],
  ['C',3,'06-25','7:00', 'SCO','BRA',[]],
  ['C',3,'06-25','7:00', 'MAR','HAI',[]],
  ['A',3,'06-25','10:00','CZE','MX', [N]],
  ['A',3,'06-25','10:00','RSA','KOR',[]],
  ['E',3,'06-26','5:00', 'ECU','GER',[]],
  ['E',3,'06-26','5:00', 'CUW','CIV',[]],
  ['F',3,'06-26','8:00', 'JPN','SWE',[N]],      // ★Japan
  ['F',3,'06-26','8:00', 'TUN','NED',[]],
  ['D',3,'06-26','11:00','TUR','USA',[Nt]],
  ['D',3,'06-26','11:00','PAR','AUS',[]],
  ['I',3,'06-27','4:00', 'NOR','FRA',[N]],
  ['I',3,'06-27','4:00', 'SEN','IRQ',[]],
  ['H',3,'06-27','9:00', 'CPV','KSA',[]],
  ['H',3,'06-27','9:00', 'URU','ESP',[Nt]],
  ['G',3,'06-27','12:00','EGY','IRN',[]],
  ['G',3,'06-27','12:00','NZL','BEL',[Nt]],
  ['L',3,'06-28','6:00', 'PAN','ENG',[]],
  ['L',3,'06-28','6:00', 'CRO','GHA',[]],
  ['K',3,'06-28','8:30', 'COL','POR',[F]],
  ['K',3,'06-28','8:30', 'COD','UZB',[]],
  ['J',3,'06-28','11:00','ALG','AUT',[]],
  ['J',3,'06-28','11:00','JOR','ARG',[N]],
];

/* ============================================================
   CHANNEL BADGE HTML
============================================================ */
function chBadges(tvArr, isJpn) {
  const badges = [];
  tvArr.forEach(ch => {
    if (ch === 'N')  badges.push('<span class="ch ch-nhk">NHK</span>');
    if (ch === 'B')  badges.push('<span class="ch ch-nhkbs">NHK BS</span>');
    if (ch === 'T')  badges.push('<span class="ch ch-ntv">日テレ</span>');
    if (ch === 'F')  badges.push('<span class="ch ch-fuji">フジ</span>');
  });
  if (tvArr.length === 0) {
    badges.push('<span class="ch ch-dazn">DAZN独占</span>');
  }
  if (isJpn) badges.push('<span class="ch ch-free">無料配信</span>');
  return `<div class="ch-list">${badges.join('')}</div>`;
}

/* ============================================================
   BUILD SCHEDULE
============================================================ */
const DOW = ['日','月','火','水','木','金','土'];

function fmtDateHeader(mmdd) {
  const [m, d] = mmdd.split('-').map(Number);
  const date = new Date(2026, m-1, d);
  const dow = DOW[date.getDay()];
  const cls = date.getDay()===6?'sat':date.getDay()===0?'sun':'';
  return { label:`${m}/${d}(${dow})`, cls };
}

// Group matches by matchday then by date
const byMd = {1:[],2:[],3:[]};
MATCHES.forEach(m => byMd[m[1]].push(m));

const main = document.getElementById('main');
const mdLabels = {1:'第1節 MD1　6/12〜6/18',2:'第2節 MD2　6/19〜6/24',3:'第3節 MD3　6/25〜6/28'};

[1,2,3].forEach(md => {
  const section = document.createElement('div');
  section.className = 'md-section';
  section.innerHTML = `<div class="md-heading"><span>MD${md}</span> ${mdLabels[md]}</div>`;

  // Group by date
  const byDate = {};
  byMd[md].forEach(m => {
    if (!byDate[m[2]]) byDate[m[2]] = [];
    byDate[m[2]].push(m);
  });

  Object.keys(byDate).sort().forEach(date => {
    const {label, cls} = fmtDateHeader(date);
    const dayMatches = byDate[date];
    const matchCount = dayMatches.length;

    const block = document.createElement('div');
    block.className = 'day-block';

    let html = `<div class="day-header ${cls}">
      <div class="day-date">${label}</div>
      <div class="day-count">${matchCount}試合</div>
    </div>`;

    // Sort by time
    dayMatches.sort((a, b) => {
      const [ah, am] = a[3].split(':').map(Number);
      const [bh, bm] = b[3].split(':').map(Number);
      return (ah*60+am) - (bh*60+bm);
    });

    const FEATURED = new Set(['ENG','ESP','FRA','BRA','ARG','POR']);

    dayMatches.forEach(([grp, , , time, home, away, tv]) => {
      const isJpn  = home==='JPN' || away==='JPN';
      const isFeat = !isJpn && (FEATURED.has(home) || FEATURED.has(away));
      const hTeam  = T[home], aTeam = T[away];
      const hJpn   = home==='JPN', aJpn = away==='JPN';
      const rowCls = isJpn ? 'japan' : isFeat ? 'featured' : '';

      html += `
        <div class="match-row ${rowCls}">
          <div class="grp-badge" style="background:${GC[grp]}">${grp}</div>
          ${isJpn  ? '<div class="star">⭐</div>'
          : isFeat ? '<div class="star-feat">🔵</div>'
          :           '<div style="width:17px;flex-shrink:0"></div>'}
          <div class="match-time">${time}</div>
          <div class="match-teams">
            <span class="team-flag">${hTeam[0]}</span>
            <span class="team-name ${hJpn?'jpn-name':''}">${hTeam[1]}</span>
            <span class="vs-sep">vs</span>
            <span class="team-flag">${aTeam[0]}</span>
            <span class="team-name ${aJpn?'jpn-name':''}">${aTeam[1]}</span>
          </div>
          ${chBadges(tv, isJpn)}
        </div>`;
    });

    block.innerHTML = html;
    section.appendChild(block);
  });

  main.appendChild(section);
});
</script>
</body>
</html>
