<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 FIFA World Cup 日程ツール</title>
  <meta http-equiv="refresh" content="0; url=02_2026WorldCup/01_time%20table/schedule.html">
  <style>
    body {
      font-family: 'Helvetica Neue', 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #1a3a6c;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 40px 48px;
      max-width: 440px;
    }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    p  { font-size: 13px; opacity: 0.75; margin-bottom: 24px; }
    a  {
      display: inline-block;
      background: #f0b429;
      color: #1a1a2e;
      font-weight: 700;
      font-size: 14px;
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
    }
    a:hover { background: #fbbf24; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h1>⚽ 2026 FIFA World Cup</h1>
    <p>日程管理ツールへリダイレクト中…</p>
    <a href="02_2026WorldCup/01_time%20table/schedule.html">📋 日程表を開く</a>
  </div>
</body>
</html>
